input {
  tcp {
    port => 5000
    codec => line
  }
}

filter {
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:thread}\] %{LOGLEVEL:log_level}\s+%{JAVACLASS:logger} - app=%{DATA:app_name} %{GREEDYDATA:log_message}"
    }
  }

  date {
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
  }

  mutate {
    rename => { "host" => "log_source_host" }
    remove_field => ["timestamp", "event", "@version"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "spring-boot-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
